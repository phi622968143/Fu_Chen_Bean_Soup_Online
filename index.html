<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>API 測試</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; }
    button { padding: 8px 16px; margin: 4px; cursor: pointer; }
    pre { background: #f4f4f4; padding: 12px; border-radius: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>

  <h3>POST /orders</h3>
  <button onclick="postOrder()">送出測試訂單</button>

  <h3>GET /back</h3>
  <button onclick="getOrders()">取得所有訂單</button>


  <h3>結果</h3>
  <pre id="result">按下按鈕查看結果</pre>

<script>
  const BASE = 'http://localhost:3000';

  async function postOrder() {
    const res = await fetch(`${BASE}/orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: '王小明',
        phone: '0912345678',
        items: [
          { item_id: 'ic001', name: '剉冰', toppings: ['粉角', '布丁'], qty: 1, price: 55 },
          { item_id: 'hd001', name: '熱綠豆薏仁', toppings: ['湯圓'], qty: 2, price: 50 }
        ],
        total: 155,
        note: '布丁少放'
      })
    });
    show(await res.json());
  }

  async function getOrders() {
    const res = await fetch(`${BASE}/back`);
    show(await res.json());
  }

  function show(data) {
    document.getElementById('result').textContent = JSON.stringify(data, null, 2);
  }
</script>

</body>
</html>
